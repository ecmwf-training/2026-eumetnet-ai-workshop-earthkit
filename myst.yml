version: 1

# Branding
extends:
  # choose between c3s.yml, cams.yml, and ecmwf.yml
  - branding/c3s.yml

project:
  title: Earthkit -- EUMETNET AI Workshop 2026
  description: >
    Showcasing earthkit at the EUMETNET AI Workshop 2026 and DestinE User eXchange #5.
  license: Apache-2.0
  open_access: true
  exclude:
    - developer/*
  github: ecmwf-training/2026-eumetnet-ai-workshop-earthkit
  thebe:
    binder:
      repo: ecmwf-training/2026-eumetnet-ai-workshop-earthkit
      provider: github
      url: https://mybinder.org
      ref: main
  exports:
    - format: pdf
      template: plain_latex_book
      output: exports/book.pdf
  toc:
    - file: content/index.md
    - title: Tutorials
      file: content/tutorials/index.md
      children:
        - title: "1. Loading and Visualising ERA5"
          file: content/tutorials/01_loading_visualising_era5.ipynb
        - title: "2. Writing to Zarr"
          file: content/tutorials/02_writing_to_zarr.ipynb
        - title: "3. Unit Conversion and Normalisation"
          file: content/tutorials/03_unit_conversion_normalisation.ipynb
        - title: "4. Grid Formats and Regridding"
          file: content/tutorials/04_grid_formats_regridding.ipynb
        - title: "5. Temporal Statistics and Derived Variables"
          file: content/tutorials/05_temporal_statistics.ipynb
        - title: "6. Chunking Strategies for ML"
          file: content/tutorials/06_chunking_strategies.ipynb
        - title: "7. Multi-source Ingestion and Polytope"
          file: content/tutorials/07_multi_source_polytope.ipynb
        - title: "8. From Zarr to PyTorch Training Loop"
          file: content/tutorials/08_zarr_to_pytorch.ipynb
    - title: How-to
      file: content/howto/index.md
      children:
        - file: content/howto/setup-book.md
        - file: content/howto/review-book.md
    - title: Explanation
      file: content/explanation/index.md
      children:
        - file: content/explanation/diataxis.md
        - file: content/explanation/branch-architecture.md
    - title: Reference
      file: content/reference/index.md
      children:
        - title: Notebook Template
          file: content/reference/template-notebook.ipynb
        - title: Best Practices
          file: content/reference/best-practices.md
        - title: Quality Assurance
          file: content/reference/quality-assurance.md
        - title: Useful Links
          file: content/reference/useful-links.md

site:
  template: book-theme
  options:
    folders: true
